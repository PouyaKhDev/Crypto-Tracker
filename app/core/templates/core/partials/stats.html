<!-- Hero Stats Section -->
<section class="hero-stats" aria-label="Market Overview">
  <div class="stats-grid">
    <div class="stat-card stat-card-gradient">
      <div class="stat-label">Total Market Cap</div>
      <div class="stat-value" id="total-market-cap">-</div>
    </div>
    <div class="stat-card stat-card-gradient">
      <div class="stat-label">24h Volume</div>
      <div class="stat-value" id="total-volume">-</div>
    </div>
    <div class="stat-card stat-card-gradient">
      <div class="stat-label">BTC Dominance</div>
      <div class="stat-value" id="btc-dominance">-</div>
    </div>
    <div class="stat-card stat-card-gradient">
      <div class="stat-label">Cryptocurrencies</div>
      <div class="stat-value" id="total-cryptos">-</div>
    </div>
  </div>
</section>

      </div>
    </div>
    <div class="stat-card stat-card-white">

      <div class="stat-content">
        <div class="stat-label">USDT Dominance</div>
        <div class="stat-value" id="usdt-dominance">-</div>
      </div>
    </div>
    <div class="stat-card stat-card-white">
      <div class="stat-icon stat-icon-orange">
        <svg
          class="icon icon-globe"
          width="24"
          height="24"

          fill="currentColor"
