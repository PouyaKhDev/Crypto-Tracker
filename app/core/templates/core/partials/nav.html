<header class="navbar" role="banner">
  <!-- MAIN NAVIGATION -->
  <nav class="navbar-container" role="navigation" aria-label="Main navigation">
    <!-- Logo -->
    <a href="{% url 'core:home' %}" class="navbar-brand" aria-label="CryptoMarket home">
      <div class="logo-icon">CM</div>
      <span class="logo-text">CryptoMarket</span>
    </a>

    <!-- Desktop Menu -->
    <ul class="navbar-menu">
      <li class="navbar-item">
        <a href="{% url 'core:home' %}" class="navbar-link">Home</a>
      </li>
      <li class="navbar-item">
        <a href="{% url 'core:dashboard' %}" class="navbar-link">Dashboard</a>
      </li>
      <li class="navbar-item">
        <a href="#" class="navbar-link">Favorites</a>
      </li>
    </ul>

    <!-- Search & Actions -->
    <div class="navbar-actions">
      <!-- Search -->
      <div class="search-container">
        <svg
          class="icon icon-search"
          width="20"
          height="20"
          viewBox="0 0 20 20"
          fill="currentColor"
          aria-hidden="true"
        >
          <path
            fill-rule="evenodd"
            d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z"
            clip-rule="evenodd"
          />
        </svg>
        <input
          type="search"
          class="search-input"
          placeholder="Search cryptocurrencies..."
          aria-label="Search cryptocurrencies"
        />
      </div>

      <!-- Auth Buttons -->
      <div class="auth-buttons">
        <a href="#" class="btn btn-ghost">Login</a>
        <a href="#" class="btn btn-primary">Sign Up</a>
      </div>
    </div>

    <!-- Mobile Menu Toggle -->
    <button class="mobile-menu-toggle" aria-label="Toggle mobile menu" aria-expanded="false">
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
    </button>
  </nav>

  <!-- MOBILE NAVIGATION -->
  <!-- Mobile Menu Overlay -->
  <div class="mobile-menu-overlay" id="mobile-menu-overlay" aria-hidden="true"></div>

  <!-- Mobile Menu Drawer -->
  <nav
    class="mobile-menu-drawer"
    id="mobile-menu-drawer"
    aria-label="Mobile navigation"
    aria-hidden="true"
  >
    <div class="mobile-menu-header">
      <a href="{% url 'core:home' %}" class="mobile-menu-logo">
        <div class="logo-icon">CM</div>
        <span class="logo-text">CryptoMarket</span>
      </a>
      <button class="mobile-menu-close" id="mobile-menu-close" aria-label="Close menu">
        &times;
      </button>
    </div>

    <div class="mobile-menu-body">
      <!-- Main Navigation -->
      <div class="mobile-menu-section">
        <ul class="mobile-menu-list">
          <li class="mobile-menu-item">
            <a href="{% url 'core:home' %}" class="mobile-menu-link">
              <span>Home</span>
            </a>
          </li>

          <li class="mobile-menu-item">
            <a href="{% url 'core:dashboard' %}" class="mobile-menu-link">
              <span>Dashboard</span>
            </a>
          </li>

          <li class="mobile-menu-item">
            <a href="#" class="mobile-menu-link">
              <span>Favorites</span>
            </a>
          </li>
        </ul>
      </div>

      <!-- Search Section -->
      <div class="mobile-menu-section">
        <div class="mobile-search-container">
          <svg
            class="icon icon-search"
            width="20"
            height="20"
            viewBox="0 0 20 20"
            fill="currentColor"
            aria-hidden="true"
          >
            <path
              fill-rule="evenodd"
              d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z"
              clip-rule="evenodd"
            />
          </svg>

          <input
            type="search"
            class="mobile-search-input"
            placeholder="Search cryptocurrencies..."
            aria-label="Search cryptocurrencies"
          />
        </div>
      </div>
    </div>
  </nav>
</header>
