<header class="navbar" role="banner">
  <!-- MAIN NAVIGATION -->
  <nav class="navbar-container" role="navigation" aria-label="Main navigation">
    <!-- Logo -->
    <a href="{% url 'core:home' %}" class="navbar-brand" aria-label="CryptoMarket home">
      <div class="logo-icon">CM</div>
      <span class="logo-text">CryptoMarket</span>
    </a>

    <!-- Desktop Menu -->
    <ul class="navbar-menu">
      <li class="navbar-item">
        <a href="{% url 'core:home' %}" class="navbar-link">Home</a>
      </li>
      <li class="navbar-item">
        <a href="{% url 'core:dashboard' %}" class="navbar-link">Dashboard</a>
      </li>
    </ul>

    <!-- Actions -->
    <div class="navbar-actions">
      <!-- Auth Buttons -->
      <div class="auth-buttons">
        {% if user.is_authenticated %}
        <form action="/auth/logout/" method="POST">
          {% csrf_token %}
          <button type="submit" class="btn btn-ghost">Logout</button>
        </form>
        {% else %}
        <a href="{% url 'accounts:login' %}" class="btn btn-primary">Login</a>
        {% endif %}
      </div>
    </div>

    <!-- Mobile Menu Toggle -->
    <button class="mobile-menu-toggle" aria-label="Toggle mobile menu" aria-expanded="false">
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
    </button>
  </nav>

  <!-- MOBILE NAVIGATION -->
  <!-- Mobile Menu Overlay -->
  <div class="mobile-menu-overlay" id="mobile-menu-overlay" aria-hidden="true"></div>

  <!-- Mobile Menu Drawer -->
  <nav
    class="mobile-menu-drawer"
    id="mobile-menu-drawer"
    aria-label="Mobile navigation"
    aria-hidden="true"
  >
    <div class="mobile-menu-header">
      <a href="{% url 'core:home' %}" class="mobile-menu-logo">
        <div class="logo-icon">CM</div>
        <span class="logo-text">CryptoMarket</span>
      </a>
      <button class="mobile-menu-close" id="mobile-menu-close" aria-label="Close menu">
        &times;
      </button>
    </div>

    <div class="mobile-menu-body">
      <!-- Main Navigation -->
      <div class="mobile-menu-section">
        <ul class="mobile-menu-list">
          <li class="mobile-menu-item">
            <a href="{% url 'core:home' %}" class="mobile-menu-link">
              <span>Home</span>
            </a>
          </li>

          <li class="mobile-menu-item">
            <a href="{% url 'core:dashboard' %}" class="mobile-menu-link">
              <span>Dashboard</span>
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>
</header>
